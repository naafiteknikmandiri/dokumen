<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sistem Bisnis AC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0B1F33; --ink-soft:#4A5D70; --muted:#7C8D9C;
    --bg:#F4F8FB; --frost:#E7F1F6; --surface:#FFFFFF; --line:#DBE6EE;
    --primary:#0CA4B8; --primary-dark:#077C8C; --primary-tint:#E0F4F7;
    --accent:#1F6FB2; --good:#15936A; --good-tint:#E3F4EC;
    --bad:#D24338; --bad-tint:#FBE7E5; --warn:#C9851F; --warn-tint:#FBF1DE;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(11,31,51,.05),0 6px 20px rgba(11,31,51,.06);
    --shadow-sm:0 1px 2px rgba(11,31,51,.06);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  h1,h2,h3{margin:0;letter-spacing:-.02em;font-weight:700}
  a{color:var(--accent)}

  /* Header */
  .topbar{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--line)}
  .topbar .accent{height:3px;background:linear-gradient(90deg,var(--primary),var(--accent))}
  .topbar-inner{max-width:1120px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;flex:none;box-shadow:0 4px 12px rgba(12,164,184,.35)}
  .mark svg{width:22px;height:22px}
  .brand-name{font-weight:800;font-size:16px;line-height:1.1;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-sub{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600}

  /* Nav */
  .nav{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:62px;z-index:40}
  .nav-inner{max-width:1120px;margin:0 auto;padding:0 12px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .nav-inner::-webkit-scrollbar{display:none}
  .nav-btn{flex:none;background:none;border:none;padding:13px 13px;font-size:13.5px;font-weight:600;color:var(--ink-soft);border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .nav-btn svg{width:16px;height:16px;opacity:.85}
  .nav-btn:hover{color:var(--ink)}
  .nav-btn.active{color:var(--primary-dark);border-bottom-color:var(--primary)}

  .wrap{max-width:1120px;margin:0 auto;padding:22px 18px 90px}

  /* Page header */
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h1{font-size:23px}
  .page-head p{margin:3px 0 0;color:var(--muted);font-size:13.5px}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:5px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;transition:.12s;white-space:nowrap}
  .btn:hover{border-color:var(--primary);color:var(--primary-dark)}
  .btn svg{width:15px;height:15px}
  .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
  .btn-ghost:hover{background:var(--frost);color:var(--ink)}
  .btn-danger{color:var(--bad);border-color:transparent}
  .btn-danger:hover{background:var(--bad-tint);border-color:transparent;color:var(--bad)}
  .btn-sm{padding:6px 10px;font-size:12.5px;gap:5px}
  .btn-sm svg{width:13px;height:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .card-pad{padding:18px}

  /* Stat tiles */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:13px;margin-bottom:22px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
  .stat .lbl{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .stat .lbl svg{width:14px;height:14px}
  .stat .val{font-size:22px;font-weight:800;margin-top:7px;letter-spacing:-.02em}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .stat.good .val{color:var(--good)} .stat.bad .val{color:var(--bad)}

  /* Tables */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
  table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:11px 12px;border-bottom:1px solid var(--line);background:var(--frost);white-space:nowrap}
  table.tbl td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.tbl tr:hover td{background:#FAFCFE}
  .row-actions{display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap}

  /* Forms */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  label{font-size:12.5px;font-weight:600;color:var(--ink-soft)}
  input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],select,textarea{
    border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);padding:10px 12px;color:var(--ink);width:100%;outline:none;transition:.12s}
  input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint)}
  textarea{resize:vertical;min-height:74px}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin:8px 0 4px;display:flex;align-items:center;gap:8px}
  .section-title .tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--primary-tint);color:var(--primary-dark);letter-spacing:.04em}
  .section-title .tag.mat{background:var(--frost);color:var(--accent)}
  hr.div{border:none;border-top:1px solid var(--line);margin:18px 0}

  /* Item editor */
  .items{width:100%;border-collapse:collapse;font-size:13px}
  .items th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding:6px 7px;text-align:left}
  .items th.num,.items td.num{text-align:right}
  .items td{padding:4px 4px}
  .items input{padding:8px 9px}
  .items .desc{min-width:150px}
  .items .qty{width:64px} .items .unit{width:74px} .items .price{width:120px}
  .items .amt{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--ink-soft);padding-right:8px}
  .x-row{border:none;background:none;color:var(--muted);font-size:18px;line-height:1;padding:6px;border-radius:8px}
  .x-row:hover{background:var(--bad-tint);color:var(--bad)}

  /* Totals box */
  .totals{margin-left:auto;max-width:340px;width:100%}
  .totals .line{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--ink-soft)}
  .totals .line .v{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink)}
  .totals .line.minus .v{color:var(--bad)}
  .totals .grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:10px;font-size:17px;font-weight:800;color:var(--ink)}
  .totals .grand .v{font-size:17px;font-weight:800}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.02em}
  .badge.paid{background:var(--good-tint);color:var(--good)}
  .badge.unpaid{background:var(--warn-tint);color:var(--warn)}
  .badge.draft{background:var(--frost);color:var(--ink-soft)}
  .badge.in{background:var(--good-tint);color:var(--good)}
  .badge.out{background:var(--bad-tint);color:var(--bad)}
  .badge.t-cuci{background:var(--primary-tint);color:var(--primary-dark)}
  .badge.t-perbaikan{background:var(--warn-tint);color:var(--warn)}
  .badge.t-pengecekan{background:var(--frost);color:var(--accent)}
  .badge.t-pemasangan{background:var(--good-tint);color:var(--good)}

  /* Photo upload */
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .photo-col h4{margin:0 0 9px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.before{background:var(--warn)} .dot.after{background:var(--good)}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px}
  .thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:var(--frost)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .rm{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(11,31,51,.7);color:#fff;border:none;font-size:13px;line-height:1;display:grid;place-items:center}
  .add-photo{width:84px;height:84px;border:1.5px dashed var(--line);border-radius:10px;display:grid;place-items:center;color:var(--muted);background:var(--surface)}
  .add-photo:hover{border-color:var(--primary);color:var(--primary)}
  .add-photo svg{width:22px;height:22px}

  /* Misc */
  .empty{text-align:center;padding:46px 20px;color:var(--muted)}
  .empty svg{width:42px;height:42px;opacity:.4;margin-bottom:10px}
  .empty h3{font-size:16px;color:var(--ink-soft);margin-bottom:5px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:160px;max-width:320px;position:relative}
  .search input{padding-left:34px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted)}
  .seg{display:inline-flex;background:var(--frost);border-radius:10px;padding:3px;gap:2px}
  .seg button{border:none;background:none;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-soft)}
  .seg button.active{background:var(--surface);color:var(--primary-dark);box-shadow:var(--shadow-sm)}
  .pill-check{display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius-sm);cursor:pointer;user-select:none}
  .pill-check input{width:auto}
  .help{font-size:12px;color:var(--muted)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:200;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner{background:var(--warn-tint);color:#7a560f;border:1px solid #efd6a3;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start}
  .logo-prev{width:64px;height:64px;border-radius:12px;border:1px solid var(--line);object-fit:contain;background:var(--frost);padding:4px}
  .muted{color:var(--muted)}
  .doc-num{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft)}
  .right{text-align:right} .nowrap{white-space:nowrap}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .list-cust{font-weight:600} .list-meta{font-size:12px;color:var(--muted)}
  .chart-box{position:relative;height:240px}
  .actions-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}

  @media(max-width:720px){
    .form-grid{grid-template-columns:1fr}
    .grid-2{grid-template-columns:1fr}
    .photo-grid{grid-template-columns:1fr}
    .page-head h1{font-size:20px}
    .wrap{padding:16px 13px 90px}
  /* ===== Auth / login ===== */
  .auth-wrap{max-width:400px;margin:6vh auto 0;padding:0 16px}
  .auth-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:26px 24px;box-shadow:0 10px 40px rgba(15,60,90,.08)}
  .auth-card h2{font-size:20px;margin:0 0 4px}
  .auth-card .sub{color:var(--muted);font-size:13.5px;margin-bottom:18px}
  .auth-card .field{margin-bottom:13px}
  .auth-card .btn{width:100%;justify-content:center;margin-top:4px}
  .auth-switch{text-align:center;margin-top:15px;font-size:13.5px;color:var(--muted)}
  .auth-switch a{color:var(--primary);cursor:pointer;font-weight:600;text-decoration:none}
  .auth-note{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--muted);margin-top:16px;line-height:1.5}
  .btn-logout{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-logout:hover{color:var(--bad);border-color:var(--bad)}
  .preauth .menu-wrap{display:none}
  .preauth .brand-btn{pointer-events:none}
  /* ===== Menu kebab (dropdown) ===== */
  .menu-wrap{position:relative;flex:none}
  .kebab{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);display:grid;place-items:center;flex:none}
  .kebab:hover{border-color:var(--primary);color:var(--primary-dark)}
  .kebab svg{width:20px;height:20px}
  .brand-btn{background:none;border:none;padding:4px 6px;border-radius:12px}
  .brand-btn:hover{background:var(--frost)}
  .brand-btn:hover .brand-name{color:var(--primary-dark)}
  .brand-btn.active .brand-sub{color:var(--primary-dark)}
  .menu-panel{position:absolute;top:calc(100% + 9px);left:0;min-width:238px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 38px rgba(8,40,60,.20);padding:7px;display:none;flex-direction:column;gap:2px;z-index:70;max-height:78vh;overflow-y:auto}
  .menu-panel.open{display:flex}
  .menu-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;border:none;background:none;font-size:14.5px;font-weight:600;color:var(--ink-soft);text-align:left;width:100%}
  .menu-item svg{width:17px;height:17px;opacity:.85;flex:none}
  .menu-item:hover{background:var(--frost);color:var(--ink)}
  .menu-item.active{background:var(--primary-tint);color:var(--primary-dark)}
  .menu-sep{height:1px;background:var(--line);margin:5px 6px}
  /* ===== Tabel unit & riwayat ===== */
  .unit-tbl th{font-size:11px;white-space:nowrap;color:var(--ink-soft)}
  .unit-tbl td{padding:4px 5px;vertical-align:middle}
  .unit-tbl input,.unit-tbl select{width:100%;font-size:13px;padding:7px 8px;min-width:80px}
</style>
</head>
<body>
<div class="topbar">
  <div class="accent"></div>
  <div class="topbar-inner">
    <div class="menu-wrap">
      <button class="kebab" data-action="menu-toggle" aria-label="Menu" title="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.6" fill="currentColor" stroke="none"/></svg></button>
      <div class="menu-panel" id="menuPanel"></div>
    </div>
    <button class="brand brand-btn" data-nav="dashboard" title="Ke Dashboard">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M7 19c0-1.5 1-2 2-2.5"/><path d="M12 19c0-1.5 1-2 2-2.5"/><path d="M17 19c0-1.5 1-2 2-2.5"/></svg>
      </div>
      <div style="min-width:0;text-align:left">
        <div class="brand-name" id="brandName">Sistem Bisnis AC</div>
        <div class="brand-sub" id="brandSub">Dashboard</div>
      </div>
    </button>
  </div>
</div>
<main class="wrap" id="app"></main>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   KONFIGURASI SUPABASE  —  ISI 2 BARIS DI BAWAH INI
   Ambil dari dashboard Supabase: Project Settings > API
   ============================================================ */
const SUPABASE_URL      = 'https://lbhnycoidmxzcswsrbwr.supabase.co';      // contoh: https://abcd1234.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxiaG55Y29pZG14emNzd3NyYndyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3ODE2OTIsImV4cCI6MjA5ODM1NzY5Mn0.uVEdiSXp4LfbwWk8Qi5JEiRbeXCpZHXbkfe_mpROui0';        // kunci publik "anon"
/* ============================================================ */

const CONFIGURED = SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.includes('GANTI') && !SUPABASE_ANON_KEY.includes('GANTI');
let sb = null;
try{ if(CONFIGURED && window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
catch(e){ console.error('Gagal inisialisasi Supabase:', e); }

const MEM = {}; // cadangan sementara bila offline / belum dikonfigurasi
async function dbGet(key, def){
  if(sb){ try{ const {data,error}=await sb.from('kv').select('value').eq('key',key).maybeSingle(); if(error) throw error; return (data&&data.value!=null)?data.value:(def??null);}catch(e){ console.warn('dbGet',key,e); return (key in MEM)?MEM[key]:(def??null);} }
  return (key in MEM)?MEM[key]:(def??null);
}
async function dbSet(key, val){ MEM[key]=val; if(sb){ try{ const {error}=await sb.from('kv').upsert({key:key, value:val, updated_at:new Date().toISOString()}); if(error) throw error;}catch(e){ console.warn('dbSet',key,e);} } }
async function dbDel(key){ delete MEM[key]; if(sb){ try{ await sb.from('kv').delete().eq('key',key);}catch(e){} } }

/* ===== Upload foto ke Supabase Storage (bucket: photos) ===== */
async function uploadDataUrl(dataURL, prefix){
  const res=await fetch(dataURL); const blob=await res.blob();
  const path=prefix+'/'+uid()+'.jpg';
  const {error}=await sb.storage.from('photos').upload(path, blob, {contentType:'image/jpeg', upsert:false});
  if(error) throw error;
  return sb.storage.from('photos').getPublicUrl(path).data.publicUrl;
}
async function uploadPhotos(arr, prefix){
  const out=[];
  for(const it of (arr||[])){
    if(typeof it!=='string') continue;
    if(it.startsWith('http')){ out.push(it); continue; }      // sudah di cloud
    if(it.startsWith('data:')){ if(sb){ try{ out.push(await uploadDataUrl(it,prefix)); continue;}catch(e){ console.warn('upload foto gagal',e);} } out.push(it); }
  }
  return out;
}
async function asDataURL(src){
  if(!src) return null;
  if(src.startsWith('data:')) return src;
  try{ const r=await fetch(src,{mode:'cors'}); const b=await r.blob(); return await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(b);}); }
  catch(e){ console.warn('ambil foto gagal',e); return src; }
}

/* ============ STATE ============ */
const S = {
  view:'dashboard',

const uid=()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const num=v=>{ const n=parseFloat(String(v??'').toString().replace(/[^0-9.-]/g,'')); return isNaN(n)?0:n; };
function rupiah(n){ n=Math.round(num(n)); const neg=n<0; n=Math.abs(n); let s=n.toLocaleString('id-ID'); return (neg?'-':'')+'Rp '+s; }
function rpPlain(n){ return Math.round(num(n)).toLocaleString('id-ID'); }
const BULAN=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
function tglPanjang(iso){ if(!iso) return '-'; const d=new Date(iso+(iso.length<=10?'T00:00:00':'')); if(isNaN(d)) return iso; return d.getDate()+' '+BULAN[d.getMonth()]+' '+d.getFullYear(); }
function tglPendek(iso){ if(!iso) return '-'; const d=new Date(iso+(iso.length<=10?'T00:00:00':'')); if(isNaN(d)) return iso; return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
function today(){ const d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nextNumber(type,prefix){ S.counters[type]=(S.counters[type]||0)+1; const seq=('000'+S.counters[type]).slice(-4); return prefix+'/'+new Date().getFullYear()+'/'+seq; }

/* Kompres & resize gambar -> dataURL JPEG (hemat penyimpanan) */
function compressImage(file, maxDim=1100, quality=.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('Gagal membaca file'));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('Gagal memuat gambar'));
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        const ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function calcInvoice(e){
  const subJasa=sumItems(e.jasa), subMat=sumItems(e.material), sub=subJasa+subMat;
  const diskon = e.diskonTipe==='persen'? sub*num(e.diskonNilai)/100 : num(e.diskonNilai);
  const dpp=Math.max(0,sub-diskon);
  const jasaDpp = sub>0 ? subJasa - diskon*(subJasa/sub) : 0;
  const ppn = e.ppn ? dpp*0.11 : 0;
  const pphBase = e.pph23Base==='dpp' ? dpp : jasaDpp;
  const pph23 = e.pph23 ? pphBase*0.02 : 0;
  const totalFaktur = dpp+ppn;
  const dibayar = totalFaktur - pph23;
  return {subJasa,subMat,sub,diskon,dpp,jasaDpp,ppn,pphBase,pph23,totalFaktur,dibayar};
}

  readAllItems();

  EDIT.pph23Base=document.getElementById('f_pphbase').value;

    +(c.ppn>0?'<div class="line"><span>Total faktur</span><span class="v">'+rupiah(c.totalFaktur)+'</span></div>':'')

    +'<div class="line grand"><span>Total dibayar</span><span class="v">'+rupiah(c.dibayar)+'</span></div>';
}

async function delWorkreport(id){
  if(sb){ try{
    for(const sub of ['before','after']){
      const {data:files}=await sb.storage.from('photos').list('wr/'+id+'/'+sub);
      if(files&&files.length) await sb.storage.from('photos').remove(files.map(f=>'wr/'+id+'/'+sub+'/'+f.name));
    }
  }catch(e){ console.warn('hapus foto cloud:',e); } }
  await dbDel('ac:wr:'+id);
  S.wrIndex=S.wrIndex.filter(x=>x.id!==id);
  await dbSet('ac:wr_index', S.wrIndex);
}

  e.nomor=g('f_nomor').value.trim(); e.tanggal=g('f_tanggal').value; e.jenis=g('f_jenis').value;
  e.customerId=(g('f_custpick')||{}).value||'';

  e.kendaraan=g('f_kendaraan').value.trim(); e.pengirim=g('f_pengirim').value.trim(); e.penerima=g('f_penerima').value.trim();

async function deliveryPDF(del){
  const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'mm',format:'a4'}); const M=14;
  const meta=['Nomor: '+(del.nomor||'-'),'Tanggal: '+tglPanjang(del.tanggal)];
  if(del.refDoc) meta.push('Ref: '+del.refDoc);
  let y=await pdfHead(doc,{title:'SURAT JALAN',meta});
  y=pdfRecipient(doc,y,{customerNama:del.customerNama,customerPIC:del.customerPIC,customerAlamat:del.tujuan||del.customerAlamat}, '');
  y+=2;
  doc.autoTable({ startY:y, theme:'plain', styles:{fontSize:9,cellPadding:1.3,textColor:[40,40,40]},
    body:[ ['Jenis',del.jenis==='jasa'?'Pekerjaan jasa':'Material / barang','Kendaraan',del.kendaraan||'-'] ],
    columnStyles:{0:{fontStyle:'bold',cellWidth:24,textColor:[90,90,90]},1:{cellWidth:66},2:{fontStyle:'bold',cellWidth:24,textColor:[90,90,90]},3:{cellWidth:'auto'}},
    margin:{left:M,right:M} });
  y=doc.lastAutoTable.finalY+3;
  const its=del.items||[];
  doc.autoTable({ startY:y,
    head:[['No','Nama Barang / Pekerjaan','Qty','Satuan','Keterangan']],
    body: its.length? its.map((it,i)=>[String(i+1), it.nama||'-', String(it.qty||''), it.satuan||'', it.ket||'-'])
        : [[{content:'Tidak ada item',colSpan:5,styles:{halign:'center',textColor:[150,150,150]}}]],
    theme:'grid', styles:{fontSize:9,cellPadding:1.8,lineColor:[223,229,234],lineWidth:0.2},
    headStyles:{fillColor:[31,111,178],textColor:[255,255,255],fontSize:8.6},
    columnStyles:{0:{halign:'center',cellWidth:10},2:{halign:'center',cellWidth:16},3:{cellWidth:22}},
    margin:{left:M,right:M} });
  y=doc.lastAutoTable.finalY;
  y=pdfNote(doc,y,'Catatan',del.catatan);
  pdfSignature(doc,y,'Pengirim,',del.pengirim||S.company.penanggungJawab||'','Penerima,',del.penerima||del.customerNama||'');
  doc.save('SuratJalan-'+safeName(del.nomor)+'.pdf');
}

function periodRange(p){
  const now=new Date(); let from,to,label;
  if(p==='month'){ from=new Date(now.getFullYear(),now.getMonth(),1); to=new Date(now.getFullYear(),now.getMonth()+1,0); label=BULAN[now.getMonth()]+' '+now.getFullYear(); }
  else if(p==='lastmonth'){ from=new Date(now.getFullYear(),now.getMonth()-1,1); to=new Date(now.getFullYear(),now.getMonth(),0); label=BULAN[from.getMonth()]+' '+from.getFullYear(); }
  else if(p==='year'){ from=new Date(now.getFullYear(),0,1); to=new Date(now.getFullYear(),11,31); label='Tahun '+now.getFullYear(); }
  else { from=new Date(2000,0,1); to=new Date(2999,11,31); label='Semua periode'; }
  return {from,to,label};
}
function financeData(){
  const {from,to,label}=periodRange(S.finPeriod);
  const list=S.transactions.filter(t=>{ const d=new Date(t.tanggal+'T00:00:00'); return d>=from&&d<=to; })
    .sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||''));
  const masuk=list.filter(t=>t.jenis==='masuk').reduce((a,t)=>a+num(t.jumlah),0);
  const keluar=list.filter(t=>t.jenis==='keluar').reduce((a,t)=>a+num(t.jumlah),0);
  return {list,masuk,keluar,laba:masuk-keluar,label};
}

let _charts={};
function drawFinanceCharts(){
  Object.values(_charts).forEach(c=>{try{c.destroy()}catch(e){}}); _charts={};
  if(typeof Chart==='undefined') return;
  const now=new Date(); const labels=[],mIn=[],mOut=[];
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    labels.push(BULAN[d.getMonth()].slice(0,3));
    const inM=S.transactions.filter(t=>{const x=new Date(t.tanggal+'T00:00:00');return t.jenis==='masuk'&&x.getMonth()===d.getMonth()&&x.getFullYear()===d.getFullYear();}).reduce((a,t)=>a+num(t.jumlah),0);
    const outM=S.transactions.filter(t=>{const x=new Date(t.tanggal+'T00:00:00');return t.jenis==='keluar'&&x.getMonth()===d.getMonth()&&x.getFullYear()===d.getFullYear();}).reduce((a,t)=>a+num(t.jumlah),0);
    mIn.push(inM); mOut.push(outM);
  }
  const c1=document.getElementById('chartCash');
  if(c1) _charts.cash=new Chart(c1,{type:'bar',data:{labels,datasets:[
    {label:'Masuk',data:mIn,backgroundColor:'#15936A',borderRadius:4},
    {label:'Keluar',data:mOut,backgroundColor:'#D24338',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}},
      scales:{y:{ticks:{callback:v=>'Rp '+(v/1000)+'k',font:{size:10}}},x:{ticks:{font:{size:11}}}}}});
  const {list}=financeData();
  const catMap={}; list.filter(t=>t.jenis==='keluar').forEach(t=>{const k=t.kategori||'Lain-lain';catMap[k]=(catMap[k]||0)+num(t.jumlah);});
  const cats=Object.keys(catMap); 
  const c2=document.getElementById('chartCat');
  if(c2){ if(cats.length){ _charts.cat=new Chart(c2,{type:'bar',data:{labels:cats,datasets:[{label:'Pengeluaran',data:cats.map(k=>catMap[k]),backgroundColor:'#1F6FB2',borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'Rp '+(v/1000)+'k',font:{size:10}}},y:{ticks:{font:{size:11}}}}}});
  } else { c2.parentElement.innerHTML='<p class="muted" style="font-size:13px;padding-top:50px;text-align:center">Belum ada pengeluaran pada periode ini.</p>'; } }
}

/* ============ HELPER EKSPOR PDF ============ */
function safeName(s){ return String(s||'dokumen').replace(/[\\/:*?"<>|]+/g,'-').trim(); }
function fmtType(d){ const m=/^data:image\/(\w+)/.exec(d||''); const t=m?m[1].toUpperCase():'JPEG'; return t==='JPG'?'JPEG':t; }
function imgDims(dataURL){ return new Promise(res=>{ const im=new Image(); im.onload=()=>res({w:im.naturalWidth||4,h:im.naturalHeight||3}); im.onerror=()=>res({w:4,h:3}); im.src=dataURL; }); }
function ensureSpace(doc,y,need){ if(y+need > doc.internal.pageSize.getHeight()-14){ doc.addPage(); return 18; } return y; }
const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
function hariName(iso){ if(!iso) return '-'; const d=new Date(iso+(iso.length<=10?'T00:00:00':'')); return isNaN(d)?'-':HARI[d.getDay()]; }
function calcQuote(q){
  const subJasa=sumItems(q.jasa), subMat=sumItems(q.material), sub=subJasa+subMat;
  const diskon = q.diskonTipe==='persen' ? sub*num(q.diskonNilai)/100 : num(q.diskonNilai);
  const dpp=Math.max(0,sub-diskon); const ppn=q.ppn? dpp*0.11:0; const grand=dpp+ppn;
  return {subJasa,subMat,sub,diskon,dpp,ppn,grand};
}
async function pdfHead(doc,opts){
  const c=S.company, M=14, pageW=doc.internal.pageSize.getWidth(); let y=14;
  let tx=M;
  if(c.logo){ try{ const d=await imgDims(c.logo); const h=Math.min(17, 38*(d.h/d.w)); const w=h*(d.w/d.h); doc.addImage(c.logo, fmtType(c.logo), M, y, w, h); tx=M+w+5; }catch(e){} }
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(20,20,20);
  doc.text(c.nama||'Nama Perusahaan', tx, y+4.5);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.4); doc.setTextColor(95,95,95);
  let ly=y+9.5; const info=[];
  if(c.alamat) doc.splitTextToSize(c.alamat,95).forEach(t=>info.push(t));
  const ct=[c.telp&&('Telp/WA: '+c.telp), c.email].filter(Boolean).join('   ');
  if(ct) info.push(ct);
  if(c.npwp) info.push('NPWP: '+c.npwp);
  info.forEach(t=>{ doc.text(t,tx,ly); ly+=4; });
  doc.setFont('helvetica','bold'); doc.setFontSize(17); doc.setTextColor(12,164,184);
  doc.text(opts.title, pageW-M, y+5, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8.6); doc.setTextColor(70,70,70);
  let ry=y+11; (opts.meta||[]).forEach(m=>{ doc.text(m, pageW-M, ry, {align:'right'}); ry+=4.4; });
  const bottom=Math.max(ly,ry,y+22);
  doc.setDrawColor(12,164,184); doc.setLineWidth(0.7); doc.line(M,bottom,pageW-M,bottom);
  return bottom+7;
}
function pdfRecipient(doc,y,rec,perihal){
  const M=14;
  doc.setFont('helvetica','normal');doc.setFontSize(8.4);doc.setTextColor(110,110,110);doc.text('Kepada Yth.',M,y);
  doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(25,25,25);doc.text(rec.customerNama||'-',M,y+5);
  doc.setFont('helvetica','normal');doc.setFontSize(8.8);doc.setTextColor(70,70,70);
  let yy=y+10; if(rec.customerPIC){doc.text('UP: '+rec.customerPIC,M,yy);yy+=4.2;}
  if(rec.customerAlamat){ doc.splitTextToSize(rec.customerAlamat,95).forEach(t=>{doc.text(t,M,yy);yy+=4.2;}); }
  if(perihal){ doc.setFont('helvetica','italic');doc.setFontSize(8.8);doc.setTextColor(60,60,60);
    doc.text('Perihal: '+perihal, doc.internal.pageSize.getWidth()-M, y+1, {align:'right'}); doc.setFont('helvetica','normal'); }
  return Math.max(yy, y+14)+2;
}
function pdfItems(doc,y,title,items){
  doc.autoTable({
    startY:y,
    head:[[{content:title,colSpan:6,styles:{halign:'left',fillColor:[31,111,178],textColor:[255,255,255],fontStyle:'bold',fontSize:9}}],

        : [[{content:'— tidak ada item —',colSpan:6,styles:{halign:'center',textColor:[150,150,150]}}]],
    theme:'grid',
    styles:{fontSize:8.6,cellPadding:1.7,lineColor:[223,229,234],lineWidth:0.2,valign:'middle'},
    headStyles:{fillColor:[238,244,248],textColor:[44,62,80],fontStyle:'bold',fontSize:8.4,lineColor:[223,229,234]},
    columnStyles:{0:{halign:'center',cellWidth:9},1:{cellWidth:'auto'},2:{halign:'center',cellWidth:14},3:{halign:'center',cellWidth:18},4:{halign:'right',cellWidth:28},5:{halign:'right',cellWidth:30}},
    margin:{left:14,right:14},
  });

function pdfTotals(doc,y,rows){
  const M=14, pageW=doc.internal.pageSize.getWidth(), rx=pageW-M, lx=pageW-M-88; y+=6;
  rows.forEach(r=>{ const g=r[2]; y=ensureSpace(doc,y,9);
    doc.setFont('helvetica',g?'bold':'normal'); doc.setFontSize(g?11:9.2);
    if(g){ doc.setTextColor(12,164,184); doc.setDrawColor(12,164,184); doc.setLineWidth(0.4); doc.line(lx,y-4,rx,y-4); }
    else doc.setTextColor(70,70,70);
    doc.text(String(r[0]),lx,y); doc.text(String(r[1]),rx,y,{align:'right'}); y+= g?7.6:5.4;
  });
  return y;
}
function pdfNote(doc,y,label,text){
  if(text==null||text==='') return y;
  const M=14, w=doc.internal.pageSize.getWidth()-2*M; y=ensureSpace(doc,y,16); y+=4;
  doc.setFont('helvetica','bold');doc.setFontSize(8.6);doc.setTextColor(90,90,90);doc.text(label,M,y);y+=4.6;
  doc.setFont('helvetica','normal');doc.setFontSize(8.8);doc.setTextColor(55,55,55);
  String(text).split('\n').forEach(line=>{ doc.splitTextToSize(line||' ',w).forEach(t=>{ y=ensureSpace(doc,y,6); doc.text(t,M,y); y+=4.4; }); });
  return y;
}
function pdfSignature(doc,y,lTitle,lName,rTitle,rName){
  const M=14, pageW=doc.internal.pageSize.getWidth(); y=ensureSpace(doc,y,42); y+=10;
  const lx=M+8, rx=pageW-M-66;
  doc.setFont('helvetica','normal');doc.setFontSize(9.4);doc.setTextColor(55,55,55);
  doc.text(lTitle,lx,y); if(rTitle) doc.text(rTitle,rx,y);
  const ny=y+26; doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
  doc.text('( '+(lName||'..............................')+' )',lx,ny);
  if(rTitle) doc.text('( '+(rName||'..............................')+' )',rx,ny);
  doc.setDrawColor(140);doc.setLineWidth(0.2); doc.line(lx,ny-2.5,lx+52,ny-2.5); if(rTitle) doc.line(rx,ny-2.5,rx+52,ny-2.5);
  return ny+6;
}
async function pdfPhotos(doc,y,label,arr){
  const M=14; doc.setDrawColor(210);
  y=ensureSpace(doc,y,12); y+=4;
  doc.setFont('helvetica','bold');doc.setFontSize(9.2);doc.setTextColor(31,111,178);doc.text(label,M,y); y+=4;
  if(!arr||!arr.length){ doc.setFont('helvetica','italic');doc.setFontSize(8.6);doc.setTextColor(150,150,150);doc.text('(tidak ada foto)',M,y+2); return y+7; }
  const boxW=88, gap=6, maxH=60; let col=0, rowMaxH=0;
  for(const d of arr){ const du=await asDataURL(d); const dim=await imgDims(du); const sc=Math.min(boxW/dim.w, maxH/dim.h); const w=dim.w*sc, h=dim.h*sc;
    if(col===0) y=ensureSpace(doc,y,maxH+8);
    const x=M+col*(boxW+gap);
    try{ doc.addImage(du, fmtType(du), x, y, w, h); }catch(e){}
    doc.setLineWidth(0.2); doc.rect(x,y,w,h);
    rowMaxH=Math.max(rowMaxH,h); col++;
    if(col>=2){ col=0; y+=rowMaxH+gap; rowMaxH=0; }
  }
  if(col>0) y+=rowMaxH+gap;
  return y+1;
}

function handleNav(v){
  const views=['dashboard','quotation','workreport','delivery','handover','invoice','customers','finance','settings'];
  if(views.includes(v)){ go(v); return; }
  if(v==='newquote'){ S.view='quotation'; renderNav(); openQuotation(); }
  else if(v==='newreport'){ S.view='workreport'; renderNav(); openWorkreport(); }
  else if(v==='newhandover'){ S.view='handover'; renderNav(); openHandover(); }
  else if(v==='newinvoice'){ S.view='invoice'; renderNav(); openInvoice(); }
  else if(v==='newtrx'){ S.view='finance'; renderNav(); openTransaction(); }
  else if(v==='newcustomer'){ S.view='customers'; renderNav(); openCustomer(); }
  else if(v==='newdelivery'){ S.view='delivery'; renderNav(); openDelivery(); }

async function handleAction(action,id,el){
  const inForm=!!document.getElementById('f_pph23');
  switch(action){
    case 'cancel': S.form=null; render(); break;
    case 'wr-unit-add': { EDIT.units=readUnits(); EDIT.units.push(blankUnit()); renderUnits(); break; }
    case 'wr-unit-del': { EDIT.units=readUnits(); EDIT.units.splice(+el.getAttribute('data-i'),1); if(!EDIT.units.length) EDIT.units.push(blankUnit()); renderUnits(); break; }
    case 'cust-save': await saveCustomer(); break;
    case 'cust-edit': { const c=S.customers.find(x=>x.id===id); if(c) openCustomer(c); break; }
    case 'cust-del': { if(confirm('Hapus pelanggan ini? Riwayat laporan tidak ikut terhapus.')){ S.customers=S.customers.filter(x=>x.id!==id); await saveCol('customers'); render(); toast('Pelanggan dihapus'); } break; }
    case 'cust-history': customerHistory(id); break;
    case 'menu-toggle': { const mp=document.getElementById('menuPanel'); if(mp) mp.classList.toggle('open'); break; }
    case 'sj-item-add': { EDIT.items=readDItems(); EDIT.items.push(blankDItem()); renderDItems(); break; }
    case 'sj-item-del': { EDIT.items=readDItems(); EDIT.items.splice(+el.getAttribute('data-i'),1); if(!EDIT.items.length) EDIT.items.push(blankDItem()); renderDItems(); break; }
    case 'sj-save': await saveDelivery(); break;
    case 'sj-edit': { const d=S.deliveries.find(x=>x.id===id); if(d) openDelivery(d); break; }
    case 'sj-del': { if(confirm('Hapus surat jalan ini?')){ S.deliveries=S.deliveries.filter(x=>x.id!==id); await saveCol('deliveries'); render(); toast('Surat jalan dihapus'); } break; }
    case 'sj-pdf': { const d=S.deliveries.find(x=>x.id===id); if(d) await deliveryPDF(d); break; }
    case 'sj-xls': { const d=S.deliveries.find(x=>x.id===id); if(d) deliveryXLS(d); break; }
    case 'auth-login': await doLogin(); break;
    case 'auth-signup': await doSignup(); break;
    case 'auth-to-signup': renderAuth('signup'); break;
    case 'auth-to-login': renderAuth('login'); break;
    case 'logout': if(confirm('Keluar dari akun?')) await doLogout(); break;
    case 'add-row': { readAllItems(); const lk=el.getAttribute('data-list'); EDIT[lk]=EDIT[lk]||[]; EDIT[lk].push(blankItem()); rerenderItems(lk); (inForm?recalcInvoice:recalcQuote)(); break; }
    case 'del-row': { readAllItems(); const lk=el.getAttribute('data-list'); EDIT[lk].splice(+el.getAttribute('data-i'),1); rerenderItems(lk); (inForm?recalcInvoice:recalcQuote)(); break; }
    case 'rm-photo': { const side=el.getAttribute('data-side'); (EDIT[side]||[]).splice(+el.getAttribute('data-i'),1); refreshThumbs(side); break; }
    /* Penawaran */
    case 'quote-save': await saveQuotation(); break;
    case 'quote-edit': { const q=S.quotations.find(x=>x.id===id); if(q) openQuotation(q); break; }
    case 'quote-del': { if(confirm('Hapus penawaran ini?')){ S.quotations=S.quotations.filter(x=>x.id!==id); await saveCol('quotations'); render(); toast('Penawaran dihapus'); } break; }
    case 'quote-pdf': { const q=S.quotations.find(x=>x.id===id); if(q) await quotePDF(q); break; }
    case 'quote-xls': { const q=S.quotations.find(x=>x.id===id); if(q) quoteXLS(q); break; }
    case 'quote-toinv': { const q=S.quotations.find(x=>x.id===id); if(q){ S.view='invoice'; renderNav(); invoiceFromQuote(q); } break; }
    /* Invoice */
    case 'inv-save': await saveInvoice(); break;
    case 'inv-edit': { const v=S.invoices.find(x=>x.id===id); if(v) openInvoice(v); break; }
    case 'inv-del': { if(confirm('Hapus invoice ini?')){ S.invoices=S.invoices.filter(x=>x.id!==id); await saveCol('invoices'); render(); toast('Invoice dihapus'); } break; }
    case 'inv-pdf': { const v=S.invoices.find(x=>x.id===id); if(v) await invoicePDF(v); break; }
    case 'inv-xls': { const v=S.invoices.find(x=>x.id===id); if(v) invoiceXLS(v); break; }
    case 'inv-status': await cycleInvoiceStatus(id); break;
    case 'inv-income': await invoiceToIncome(id); break;
    /* Laporan pengerjaan (muat async karena ada foto) */
    case 'wr-save': await saveWorkreport(); break;
    case 'wr-edit': { const wr=await dbGet('ac:wr:'+id); if(wr) openWorkreport(wr); else toast('Data tidak ditemukan'); break; }
    case 'wr-del': { if(confirm('Hapus laporan ini?')){ await delWorkreport(id); render(); toast('Laporan dihapus'); } break; }
    case 'wr-pdf': { toast('Menyiapkan PDF...'); const wr=await dbGet('ac:wr:'+id); if(wr) await workreportPDF(wr); else toast('Data tidak ditemukan'); break; }
    case 'wr-xls': { const wr=await dbGet('ac:wr:'+id); if(wr) workreportXLS(wr); else toast('Data tidak ditemukan'); break; }
    /* Berita acara */
    case 'ba-save': await saveHandover(); break;
    case 'ba-edit': { const b=S.handovers.find(x=>x.id===id); if(b) openHandover(b); break; }
    case 'ba-del': { if(confirm('Hapus berita acara ini?')){ S.handovers=S.handovers.filter(x=>x.id!==id); await saveCol('handovers'); render(); toast('Berita acara dihapus'); } break; }
    case 'ba-pdf': { const b=S.handovers.find(x=>x.id===id); if(b) await handoverPDF(b); break; }
    case 'ba-xls': { const b=S.handovers.find(x=>x.id===id); if(b) handoverXLS(b); break; }
    /* Keuangan */
    case 'trx-save': await saveTransaction(); break;
    case 'trx-edit': { const t=S.transactions.find(x=>x.id===id); if(t) openTransaction(t); break; }
    case 'trx-del': { if(confirm('Hapus transaksi ini?')){ S.transactions=S.transactions.filter(x=>x.id!==id); await saveCol('transactions'); render(); toast('Transaksi dihapus'); } break; }
    case 'fin-pdf': await financePDF(); break;
    case 'fin-xls': financeXLS(); break;
  }
}

let _hist={unitsMap:{}}; let _histCharts=[];
function customerHistory(id){
  const c=custById(id); if(!c){ toast('Pelanggan tidak ditemukan'); return; }
  const reps=reportsOfCustomer(c).slice().sort((a,b)=>(a.tanggal||'').localeCompare(b.tanggal||''));
  const unitsMap={};
  reps.forEach(r=>{ (r.units||[]).forEach(u=>{ const k=(u.noAC||'(tanpa nomor)'); (unitsMap[k]=unitsMap[k]||[]).push({tanggal:r.tanggal,nomor:r.nomor,jenis:u.jenis,freon:u.freon,ampere:u.ampere,lokasi:u.lokasi}); }); });
  _hist={unitsMap}; const unitKeys=Object.keys(unitsMap);
  let html=''
  +'<div class="page-head"><div><div class="eyebrow">Riwayat Layanan</div><h1>'+esc(c.perusahaan||c.nama)+'</h1>'+((c.perusahaan&&c.nama)?'<p>'+esc(c.nama)+(c.telp?(' \u00b7 '+esc(c.telp)):'')+'</p>':'')+'</div>'
  +'<button class="btn btn-ghost" data-nav="customers">'+svg(I.arrow,14)+'Kembali</button></div>';
  if(!reps.length){ S.form={html: html+emptyState(I.history,'Belum ada riwayat','Laporan untuk pelanggan ini akan muncul di sini. Pilih pelanggan ini saat membuat laporan pengerjaan.',''), after:null}; render(); window.scrollTo(0,0); return; }
  html+='<div class="card card-pad" style="margin-bottom:14px"><b>'+reps.length+'</b> laporan \u00b7 <b>'+unitKeys.length+'</b> unit AC terpantau. Grafik freon &amp; ampere membantu melihat tren sebelum unit bermasalah.</div>';
  unitKeys.forEach((k,idx)=>{
    const list=unitsMap[k]; const last=list[list.length-1];
    const hasNum=list.some(x=>parseFloat(String(x.freon).replace(',','.'))||parseFloat(String(x.ampere).replace(',','.')));
    html+='<div class="card card-pad" style="margin-bottom:14px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">'
      +'<div><b>'+esc(k)+'</b>'+(last.lokasi?(' <span class="muted">\u00b7 '+esc(last.lokasi)+'</span>'):'')+'</div>'
      +'<span class="muted" style="font-size:12.5px">'+list.length+'\u00d7 servis</span></div>'
      + (hasNum? '<div style="height:180px;margin-top:10px"><canvas id="hist_'+idx+'"></canvas></div>':'')
      +'<div class="table-scroll" style="margin-top:9px"><table class="tbl"><thead><tr><th>Tanggal</th><th>Jenis</th><th>Freon</th><th>Ampere</th><th>No. Laporan</th></tr></thead><tbody>'
      + list.slice().reverse().map(x=>'<tr><td>'+tglPendek(x.tanggal)+'</td><td>'+esc((WORK_TYPES.find(w=>w[0]===x.jenis)||[,x.jenis||'-'])[1])+'</td><td>'+esc(x.freon||'-')+'</td><td>'+esc(x.ampere||'-')+'</td><td class="muted">'+esc(x.nomor||'-')+'</td></tr>').join('')
      +'</tbody></table></div></div>';
  });
  S.form={ html, after: ()=>drawHistoryCharts(unitKeys) }; render(); window.scrollTo(0,0);
}
function drawHistoryCharts(unitKeys){
  _histCharts.forEach(c=>{try{c.destroy();}catch(e){}}); _histCharts=[];
  const um=_hist.unitsMap;
  unitKeys.forEach((k,idx)=>{
    const cv=document.getElementById('hist_'+idx); if(!cv) return;
    const list=um[k]; const labels=list.map(x=>tglPendek(x.tanggal));
    const freon=list.map(x=>{const n=parseFloat(String(x.freon).replace(',','.')); return isNaN(n)?null:n;});
    const amp=list.map(x=>{const n=parseFloat(String(x.ampere).replace(',','.')); return isNaN(n)?null:n;});
    _histCharts.push(new Chart(cv.getContext('2d'),{ type:'line',
      data:{labels, datasets:[
        {label:'Freon', data:freon, borderColor:'#0CA4B8', backgroundColor:'rgba(12,164,184,.12)', tension:.3, spanGaps:true, yAxisID:'y'},
        {label:'Ampere', data:amp, borderColor:'#C9851F', backgroundColor:'rgba(201,133,31,.12)', tension:.3, spanGaps:true, yAxisID:'y1'} ]},
      options:{responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
        scales:{ y:{position:'left',title:{display:true,text:'Freon'}}, y1:{position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'Ampere'}} },
        plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}} }} ));
  });
}

}
async function doSignup(){
  const email=(document.getElementById('au_email').value||'').trim(); const pass=document.getElementById('au_pass').value||'';
  if(!email||pass.length<6){ toast('Email wajib & password minimal 6 karakter'); return; }
  toast('Membuat akun...');
  const {data,error}=await sb.auth.signUp({email, password:pass});
  if(error){ toast('Gagal daftar: '+error.message); return; }
  if(data && data.session){ await startApp(); }
  else { toast('Akun dibuat. Bila diminta, konfirmasi via email lalu masuk.'); renderAuth('login'); }
}
async function doLogout(){ try{ await sb.auth.signOut(); }catch(e){} location.reload(); }
function injectLogout(){
  const bar=document.querySelector('.topbar-inner');
  if(bar && !document.getElementById('logoutBtn')){
    const b=document.createElement('button'); b.id='logoutBtn'; b.className='btn-logout'; b.setAttribute('data-action','logout');
    b.innerHTML=LOGOUT_SVG+'<span>Keluar</span>'; bar.appendChild(b);
  }
}
async function startApp(){
  document.body.classList.remove('preauth');
  try{ await loadAll(); }catch(e){ console.error('Gagal memuat data:',e); toast('Gagal memuat data dari server'); }
  injectLogout(); renderNav(); render();
}

/* ============ INISIALISASI ============ */
(async function init(){
  if(!sb){ renderConfigNeeded(); return; }
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session) await startApp(); else renderAuth('login');
  }catch(e){ console.error('init',e); renderAuth('login'); }
})();
</script>
</body>
</html>
